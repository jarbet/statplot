# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 0 * * 6'

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }

    env:
      GITHUB_PAT: ${{ secrets.STATGENCORE_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Cache Bioconductor packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: bioc-${{ runner.os }}-${{ matrix.config.r }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: bioc-${{ runner.os }}-${{ matrix.config.r }}-

      - name: Install Bioconductor dependencies
        run: |
          install.packages("BiocManager")
          BiocManager::install(c("ComplexHeatmap", "clusterProfiler", "enrichplot"), ask = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'