name: R Package CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 0 * * 6'

jobs:
  check:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    env:
      GITHUB_PAT: ${{ secrets.STATGENCORE_PAT }}

    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v4

      # Step 2: Set up Pandoc (for vignettes / README)
      - uses: r-lib/actions/setup-pandoc@v2

      # Step 3: Set up R
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      # Step 4: Install R dependencies (CRAN + Bioconductor)
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Step 5: Run R CMD check
      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'
          upload-results: false
          upload-snapshots: false